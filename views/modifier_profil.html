<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier le Profil - SkillSwap</title>
    <style>
        /* === BASE DASHBOARD (REPRISE EXACTE) === */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; background: #eef2f7; }
        .sidebar { width: 220px; background: linear-gradient(180deg, #6a11cb, #2575fc); color: white; height: 100vh; padding: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 20px; }
        .sidebar a { display: block; color: white; text-decoration: none; margin: 15px 0; padding: 10px; border-radius: 5px; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255,255,255,0.2); }
        .main { flex: 1; padding: 20px; }
        .topbar { background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        
        /* === FORMULAIRE PROFIL === */
        .profile-wrapper { max-width: 850px; margin: 25px auto; }
        .profile-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.06); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px 15px; border: 2px solid #e8e8e8; border-radius: 10px; 
            font-size: 14px; background: #fafafa; transition: 0.3s; font-family: inherit; 
        }
        .form-group input:focus, .form-group textarea:focus { 
            outline: none; border-color: #7b2ff7; background: white; 
            box-shadow: 0 0 0 4px rgba(123, 47, 247, 0.1); 
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 25px; padding-top: 20px; border-top: 2px solid #f4f4f4; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-save { background: linear-gradient(90deg, #7b2ff7, #a855f7); color: white; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(123, 47, 247, 0.3); }
        .btn-cancel { background: #f3f4f6; color: #4b5563; }
        .btn-cancel:hover { background: #e5e7eb; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SkillSwap</h2>
        <a href="../design.html">Dashboard</a>
        <a href="#">Mes Compétences</a>
        <a href="#">Offres</a>
        <a href="#">Messages</a>
        <a href="profil.html">Profil</a>
    </div>

    <!-- CONTENU -->
    <div class="main">
        <div class="topbar">
            <h3>Modifier le Profil</h3>
            <button style="background: #ef4444; border: none; color: white; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 500;">Déconnexion</button>
        </div>

        <div class="profile-wrapper">
            <div class="profile-card">
                <form>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" name="nom" placeholder="Ton nom">
                        </div>
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" name="prenom" placeholder="Ton prénom">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="exemple@email.com">
                    </div>

                    <div class="form-group">
                        <label>Bio / Présentation</label>
                        <textarea name="bio" placeholder="Décris-toi en quelques lignes..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Compétences (séparées par des virgules)</label>
                        <input type="text" name="competences" placeholder="Ex: HTML, CSS, Design, Montage vidéo">
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn btn-save">💾 Enregistrer</button>
                        <button type="button" class="btn btn-cancel" onclick="window.location.href='profil.html'">Annuler</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
