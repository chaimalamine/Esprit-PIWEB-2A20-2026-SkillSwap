<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil - SkillSwap</title>
    <style>
        /* === BASE DASHBOARD === */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; background: #eef2f7; }
        .sidebar { width: 220px; background: linear-gradient(180deg, #6a11cb, #2575fc); color: white; height: 100vh; padding: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 20px; }
        .sidebar a { display: block; color: white; text-decoration: none; margin: 15px 0; padding: 10px; border-radius: 5px; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255,255,255,0.2); }
        .main { flex: 1; padding: 20px; }
        .topbar { background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        
        /* === PROFIL SPÉCIFIQUE === */
        .profile-wrapper { max-width: 850px; margin: 25px auto; }
        .profile-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.06); }
        
        .profile-header { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 2px solid #f4f4f4; margin-bottom: 25px; }
        .avatar { width: 75px; height: 75px; background: linear-gradient(135deg, #7b2ff7, #a855f7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; font-weight: bold; flex-shrink: 0; }
        .user-meta h2 { margin: 0 0 8px 0; color: #222; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #cd7f32; color: white; }
        .rep-score { color: #888; font-weight: 500; font-size: 14px; margin-top: 6px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .info-box { background: #f8f9fb; padding: 15px; border-radius: 10px; }
        .info-box label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .info-box span { font-size: 15px; color: #111; }
        
        .bio-box { background: #f8f9fb; padding: 15px; border-radius: 10px; margin-bottom: 25px; }
        .bio-box label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .bio-box p { margin: 0; color: #888; font-style: italic; }
        
        .skills-area label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .skill-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tag { background: #eef2ff; color: #7b2ff7; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .empty-skill { background: #eee; color: #999; }

        .actions { display: flex; gap: 15px; margin-top: 35px; padding-top: 25px; border-top: 2px solid #f4f4f4; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-edit { background: linear-gradient(90deg, #7b2ff7, #a855f7); color: white; }
        .btn-edit:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(123, 47, 247, 0.3); }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-danger:hover { background: #fecaca; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SkillSwap</h2>
        <a href="../design.html">Dashboard</a>
        <a href="#">Mes Compétences</a>
        <a href="#">Offres</a>
        <a href="#">Messages</a>
        <a href="profil.html" style="background: rgba(255,255,255,0.2);">Profil</a>
    </div>

    <!-- CONTENU -->
    <div class="main">
        <div class="topbar">
            <h3>Gestion du Profil</h3>
            <button style="background: #ef4444; border: none; color: white; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 500;">Déconnexion</button>
        </div>

        <div class="profile-wrapper">
            <div class="profile-card">
                
                <!-- EN-TÊTE -->
                <div class="profile-header">
                    <div class="avatar">S</div> <!-- Première lettre du nom -->
                    <div class="user-meta">
                        <h2>Seif [Nom Utilisateur]</h2>
                        <span class="badge">🥉 Bronze</span> <!-- Badge par défaut -->
                        <div class="rep-score">⭐ 0.0 / 5.0 (0 avis)</div> <!-- Score vide au début -->
                    </div>
                </div>

                <!-- INFOS -->
                <div class="info-grid">
                    <div class="info-box">
                        <label>Email</label>
                        <span>seif@email.com</span>
                    </div>
                    <div class="info-box">
                        <label>Membre depuis</label>
                        <span>Aujourd'hui</span>
                    </div>
                </div>

                <!-- BIO VIDE -->
                <div class="bio-box">
                    <label>Bio / Présentation</label>
                    <p>Aucune bio définie pour le moment. Cliquez sur modifier pour vous présenter !</p>
                </div>

                <!-- COMPÉTENCES VIDE -->
                <div class="skills-area">
                    <label>Mes Compétences</label>
                    <div class="skill-tags">
                        <span class="skill-tag empty-skill">Aucune compétence ajoutée</span>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="actions">
                    <button class="btn btn-edit" onclick="window.location.href='modifier_profil.html'">✏️ Modifier le profil</button>
                    <button class="btn btn-danger">🗑️ Supprimer le compte</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
